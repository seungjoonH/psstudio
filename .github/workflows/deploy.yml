name: Deploy to GCE

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: deploy-gce-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Require deploy secrets
        env:
          GCE_HOST: ${{ secrets.GCE_HOST }}
          GCE_SSH_KEY: ${{ secrets.GCE_SSH_KEY }}
          GCE_USER: ${{ secrets.GCE_USER }}
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
        run: |
          test -n "$GCE_HOST" || { echo "Missing repository secret GCE_HOST"; exit 1; }
          test -n "$GCE_SSH_KEY" || { echo "Missing repository secret GCE_SSH_KEY"; exit 1; }
          test -n "$GCE_USER" || { echo "Missing repository secret GCE_USER"; exit 1; }
          test -n "$NEXT_PUBLIC_API_BASE_URL" || { echo "Missing repository secret NEXT_PUBLIC_API_BASE_URL"; exit 1; }

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push FE image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: fe/Dockerfile
          push: true
          tags: ${{ env.IMAGE_REGISTRY }}/psstudio-fe:${{ env.IMAGE_TAG }}
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
          cache-from: type=gha,scope=fe
          cache-to: type=gha,mode=max,scope=fe

      - name: Build and push BE image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: be/Dockerfile
          push: true
          tags: ${{ env.IMAGE_REGISTRY }}/psstudio-be:${{ env.IMAGE_TAG }}
          cache-from: type=gha,scope=be
          cache-to: type=gha,mode=max,scope=be

      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: worker/Dockerfile
          push: true
          tags: ${{ env.IMAGE_REGISTRY }}/psstudio-worker:${{ env.IMAGE_TAG }}
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker

      - name: Configure SSH
        env:
          GCE_HOST: ${{ secrets.GCE_HOST }}
          GCE_SSH_KEY: ${{ secrets.GCE_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$GCE_SSH_KEY" > ~/.ssh/gce_key
          chmod 600 ~/.ssh/gce_key
          ssh-keyscan -H "$GCE_HOST" >> ~/.ssh/known_hosts

      - name: Prepare remote directory
        env:
          GCE_HOST: ${{ secrets.GCE_HOST }}
          GCE_USER: ${{ secrets.GCE_USER }}
        run: |
          test -n "$GCE_USER"
          ssh -i ~/.ssh/gce_key "$GCE_USER@$GCE_HOST" "sudo mkdir -p /opt/psstudio && sudo chown \"$GCE_USER:$GCE_USER\" /opt/psstudio"

      - name: Upload compose files
        env:
          GCE_HOST: ${{ secrets.GCE_HOST }}
          GCE_USER: ${{ secrets.GCE_USER }}
        run: |
          scp -i ~/.ssh/gce_key docker-compose.prod.yml Caddyfile "$GCE_USER@$GCE_HOST:/opt/psstudio/"

      - name: Restart services
        env:
          GCE_HOST: ${{ secrets.GCE_HOST }}
          GCE_USER: ${{ secrets.GCE_USER }}
          IMAGE_REGISTRY: ${{ env.IMAGE_REGISTRY }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          APP_ENV_FILE: /etc/psstudio/.env.production
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
        run: |
          ssh -i ~/.ssh/gce_key "$GCE_USER@$GCE_HOST" "echo \"$GHCR_TOKEN\" | docker login ghcr.io -u \"$GHCR_USER\" --password-stdin && cd /opt/psstudio && IMAGE_REGISTRY=\"$IMAGE_REGISTRY\" IMAGE_TAG=\"$IMAGE_TAG\" APP_ENV_FILE=\"$APP_ENV_FILE\" docker compose -f docker-compose.prod.yml pull && IMAGE_REGISTRY=\"$IMAGE_REGISTRY\" IMAGE_TAG=\"$IMAGE_TAG\" APP_ENV_FILE=\"$APP_ENV_FILE\" docker compose -f docker-compose.prod.yml up -d --remove-orphans"
